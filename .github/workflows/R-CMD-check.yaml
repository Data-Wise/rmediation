# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Routine release-R jobs: full Suggests (incl. OpenMx/medfit) install
          # fast from prebuilt binaries via RSPM.
          - {os: macos-latest,   r: 'release', pkg-deps: '"all"',                       extra: 'any::rcmdcheck'}
          - {os: windows-latest, r: 'release', pkg-deps: '"all"',                       extra: 'any::rcmdcheck'}
          - {os: ubuntu-latest,   r: 'release', pkg-deps: '"all"',                      extra: 'any::rcmdcheck'}
          # Routine R-devel job: skip OpenMx/medfit (no R-devel binaries, build
          # from source = 15-25 min). Both are Suggests with requireNamespace()
          # guards + skip_if_not_installed() tests, so the package still checks
          # cleanly without them; the full Suggests set (incl. OpenMx/medfit)
          # is exercised by the pre-submission r-hub/win-builder pass instead.
          - {os: ubuntu-latest,   r: 'devel',   pkg-deps: '"hard"',                     extra: 'any::rcmdcheck, any::testthat, any::lavaan, any::knitr'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ matrix.config.extra }}
          dependencies: ${{ matrix.config.pkg-deps }}
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--ignore-vignettes")'
          build_args: 'c("--no-manual")'
